name: Docker

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_image:
        description: Push images to Docker Hub
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: kjake/feed2toot

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            dockerfile: Dockerfile
            arch_tag: amd64
          - platform: linux/arm64
            dockerfile: Dockerfile.aarch64
            arch_tag: arm64v8

    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true' }}
          tags: ${{ env.IMAGE_NAME }}:${{ matrix.arch_tag }}-latest
          cache-from: type=gha,scope=${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch_tag }}

  manifest:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true' }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:amd64-latest" \
            "${IMAGE_NAME}:arm64v8-latest"

      - name: Inspect published manifest
        run: docker buildx imagetools inspect "${IMAGE_NAME}:latest"

  security:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true' }}
    needs: manifest
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      security-events: write

    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate and submit SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:latest
          artifact-name: image.spdx.json
          format: spdx-json
          dependency-snapshot: true
          upload-artifact: true

      - name: Scan published image
        id: scan
        uses: anchore/scan-action@v7
        with:
          image: ${{ env.IMAGE_NAME }}:latest
          fail-build: false
          output-format: sarif
          output-file: grype-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: anchore-container
